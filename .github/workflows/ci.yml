name: Node.js CI

on:
  push:
    branches: [ master, testing, ci-cd-infrastructure, feature/*, feat/*, fix/*, jules/*, merge/*, merge-* ]
  pull_request:
    branches: [ master, testing, ci-cd-infrastructure, feature/*, feat/*, fix/*, jules/*, merge/*, merge-* ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Start Firebase emulators
        run: |
          firebase emulators:start --only firestore,auth --project demo-barterverse &
          # Wait for emulators to start
          sleep 10
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099

      - name: Run unit tests (REQUIRED)
        run: npm run test:unit -- --coverage --coverageThreshold='{"global":{"lines":70,"branches":60,"statements":70,"functions":60}}'
        env:
          NEXT_PUBLIC_USE_FIREBASE_EMULATORS: true
          FIRESTORE_EMULATOR_HOST: localhost:8080
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099

      - name: Build application (REQUIRED)
        run: npm run build
        env:
          GOOGLE_API_KEY: placeholder_for_build
          NEXT_PUBLIC_FIREBASE_API_KEY: placeholder_for_build
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder-project
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: placeholder
          NEXT_PUBLIC_FIREBASE_APP_ID: placeholder

      - name: Run linters
        run: npm run lint

      - name: Run type checkers  
        run: npm run typecheck

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run End-to-End tests
        run: npm run test:e2e
        env:
          BASE_URL: http://localhost:9002
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          NEXT_PUBLIC_USE_FIREBASE_EMULATORS: true
          FIRESTORE_EMULATOR_HOST: localhost:8080
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Jest coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage-report
          path: coverage/
          retention-days: 7

      - name: Stop Firebase emulators
        if: always()
        run: |
          pkill -f "firebase emulators" || true
