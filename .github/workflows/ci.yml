on: [push, pull_request]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - run: |
          # Debug: Check if repo exists first
          curl -H "Authorization: token ${{ secrets.CICD_TOKEN }}" \
               https://api.github.com/repos/creat-o-r/Firebase-GitHub
          
          # Then try dispatch
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.CICD_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/creat-o-r/Firebase-GitHub/dispatches \
            -d '{"event_type": "pipeline"}'