name: Node.js CI

on:
  push:
    branches: [ master, testing, ci-cd-infrastructure, feature/*, feat/*, fix/*, jules/* ]
  pull_request:
    branches: [ master, testing, ci-cd-infrastructure, feature/*, feat/*, fix/*, jules/* ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (REQUIRED)
        run: npm run test:unit -- --coverage --coverageThreshold='{"global":{"lines":90,"branches":77,"statements":89,"functions":79}}'

      - name: Build application (REQUIRED)
        run: npm run build
        env:
          GOOGLE_API_KEY: placeholder_for_build

      - name: Run linters
        run: npm run lint

      - name: Run type checkers  
        run: npm run typecheck

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run End-to-End tests
        run: npm run test:e2e
        env:
          BASE_URL: http://localhost:9002
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GOOGLE_API_KEY }} # Also try setting GEMINI_API_KEY

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Jest coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage-report
          path: coverage/
          retention-days: 7
