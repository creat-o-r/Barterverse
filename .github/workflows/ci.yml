name: Node.js CI

on:
  push:
    branches: [ master, testing, ci-cd-infrastructure, feature/*, feat/*, fix/*, jules/*, merge/*, merge-* ]
  pull_request:
    branches: [ master, testing, ci-cd-infrastructure, feature/*, feat/*, fix/*, jules/*, merge/*, merge-* ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Enable Firebase experiments
        run: firebase experiments:enable webframeworks

      - name: Start Firebase emulators
        run: |
          firebase emulators:start --only firestore,auth --project demo-barterverse > emulator.log 2>&1 &
          EMULATOR_PID=$!
          echo "Emulator PID: $EMULATOR_PID"
          
          # Wait for emulators to start with timeout
          timeout=30
          while [ $timeout -gt 0 ]; do
            if curl -s http://127.0.0.1:8081 > /dev/null 2>&1 && curl -s http://127.0.0.1:9099 > /dev/null 2>&1; then
              echo "Emulators are ready"
              break
            fi
            echo "Waiting for emulators... ($timeout seconds left)"
            sleep 2
            timeout=$((timeout - 2))
          done
          
          if [ $timeout -le 0 ]; then
            echo "Emulators failed to start within 30 seconds"
            cat emulator.log
            exit 1
          fi

      - name: Run unit tests (REQUIRED)
        run: npm run test:unit -- --coverage --coverageThreshold='{"global":{"lines":70,"branches":60,"statements":70,"functions":60}}'
        env:
          NEXT_PUBLIC_USE_FIREBASE_EMULATORS: true
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8081
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099

      - name: Build application (REQUIRED)
        run: npm run build
        env:
          GOOGLE_API_KEY: placeholder_for_build
          NEXT_PUBLIC_FIREBASE_API_KEY: placeholder_for_build
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-barterverse
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: placeholder
          NEXT_PUBLIC_FIREBASE_APP_ID: placeholder
          NEXT_PUBLIC_ENVIRONMENT: test
          NEXT_PUBLIC_FIREBASE_ENV: development
          NEXT_PUBLIC_USE_FIREBASE_EMULATORS: true

      - name: Run linters
        run: npm run lint

      - name: Run type checkers  
        run: npm run typecheck

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run End-to-End tests
        run: npm run test:e2e
        env:
          BASE_URL: http://localhost:9002
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          NEXT_PUBLIC_USE_FIREBASE_EMULATORS: true
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8081
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Jest coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage-report
          path: coverage/
          retention-days: 7

      - name: Stop Firebase emulators
        if: always()
        run: |
          pkill -f "firebase emulators" || true
