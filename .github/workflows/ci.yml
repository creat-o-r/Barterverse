name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    # Steps will be added here in subsequent plan items
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run linters
        run: npm run lint

      - name: Run type checkers
        run: npm run typecheck

      - name: Run unit and integration tests
        run: npm run test:unit

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SOME_KEY: placeholder_value

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run End-to-End tests
        run: npm run test:e2e
        env:
          BASE_URL: http://localhost:3000 # Assuming default Next.js port, adjust if needed
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Upload Playwright HTML report
        if: always() # Always run this step to upload reports even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/ # Default Playwright HTML report path
          retention-days: 7 # Optional: how long to keep the report

      - name: Upload Jest coverage report
        if: always() # Always run this step
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage-report
          path: coverage/ # Common path for Jest coverage reports
          retention-days: 7 # Optional: how long to keep the report
