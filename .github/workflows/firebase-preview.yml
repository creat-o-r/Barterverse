name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build_and_preview:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      
      - name: Configure Firebase secrets
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_BARTERVERSE_L9UQ3 }}' > /tmp/service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/service-account.json
          
          # Authenticate with gcloud
          gcloud auth activate-service-account --key-file=/tmp/service-account.json
          
          # Get API key from existing Google Secret Manager
          API_KEY=$(gcloud secrets versions access latest --secret="google-ai-api-key" --project="barterverse-l9uq3")
          echo "::add-mask::$API_KEY"
          
          # Set Firebase Functions secret using Firebase CLI
          echo "$API_KEY" | firebase functions:secrets:set GOOGLE_API_KEY --project="barterverse-l9uq3"
          rm /tmp/service-account.json
      
      - name: Build project  
        run: npm run build
        env:
          NEXT_PUBLIC_BUILD_COMMIT: ${{ github.sha }}
          NEXT_PUBLIC_BUILD_BRANCH: ${{ github.head_ref }}
          NEXT_PUBLIC_BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        
      - name: Deploy to Firebase Preview Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        id: firebase_deploy
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_BARTERVERSE_L9UQ3 }}'
          projectId: barterverse-l9uq3
          target: barterverse-auto-deploy
          expires: 7d
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
      
      - name: Analyze build failure and comment on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            // Get GitHub token from Secret Manager
            const { exec } = require('child_process');
            const util = require('util');
            const execAsync = util.promisify(exec);
            
            try {
              // Authenticate and get GitHub token
              await execAsync(`echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_BARTERVERSE_L9UQ3 }}' > /tmp/service-account.json`);
              await execAsync('gcloud auth activate-service-account --key-file=/tmp/service-account.json');
              const { stdout: token } = await execAsync('gcloud secrets versions access latest --secret="github-token" --project="barterverse-l9uq3"');
              const githubToken = token.trim();
              
              // Get current workflow run logs
              const response = await fetch(`https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/logs`, {
                headers: { 'Authorization': `token ${githubToken}` }
              });
              
              if (response.ok) {
                const commit = '${{ github.sha }}'.slice(0, 7);
                const branch = '${{ github.head_ref }}';
                const runUrl = 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}';
                
                const comment = `## ❌ Build Failed - Automatic Analysis
                
                **📝 Branch:** \`${branch}\`  
                **💾 Commit:** \`${commit}\`  
                **🔗 Full Logs:** [View in GitHub Actions](${runUrl})
                
                **Common fixes:**
                - Check for missing dependencies in package.json
                - Verify TypeScript compilation errors
                - Check environment variables and secrets
                
                This is an automated failure analysis. Check the full logs for details.`;
                
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
              }
              
              // Cleanup
              await execAsync('rm -f /tmp/service-account.json');
            } catch (error) {
              console.log('Failed to analyze build failure:', error.message);
            }

      - name: Comment on PR with deployment info
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentUrl = '${{ steps.firebase_deploy.outputs.details_url }}' || 'https://barterverse-auto-deploy.web.app';
            const commit = '${{ github.event.pull_request.head.sha }}'.slice(0, 7);
            const branch = '${{ github.head_ref }}';
            const buildTime = new Date().toLocaleString();
            
            const comment = `## 🚀 Preview Deployment Successful!
            
            **🌐 Preview URL:** ${deploymentUrl}  
            **📝 Branch:** \`${branch}\`  
            **💾 Commit:** \`${commit}\`  
            **⏰ Built:** ${buildTime}  
            **🔧 APIs:** Secret Manager integration enabled ✅
            
            **Quick Links:**
            - [📱 Open Preview Site](${deploymentUrl})
            - [🔧 Test API Endpoint](${deploymentUrl}/api/test-key)
            - [📊 View Commit](https://github.com/${{ github.repository }}/commit/${{ github.event.pull_request.head.sha }})
            
            *Preview expires in 7 days*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });