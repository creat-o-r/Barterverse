name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build_and_preview:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Wait for CI (testing/production branches only)
        if: github.base_ref == 'testing' || github.base_ref == 'master' || github.base_ref == 'main'
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: 'test'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30
          
      - name: Skip CI for dev branches
        if: github.base_ref != 'testing' && github.base_ref != 'master' && github.base_ref != 'main'
        run: echo "🚀 Dev branch detected - skipping CI wait for instant preview"
          
      - name: Install dependencies
        run: npm ci
      
      - name: Get Google AI API Key from Secret Manager
        id: get-api-key
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_BARTERVERSE_L9UQ3 }}' > /tmp/service-account.json
          gcloud auth activate-service-account --key-file=/tmp/service-account.json
          API_KEY=$(gcloud secrets versions access latest --secret="google-ai-api-key" --project="barterverse-l9uq3")
          echo "::add-mask::$API_KEY"
          echo "GOOGLE_API_KEY=$API_KEY" >> $GITHUB_ENV
          # Create .env.production for Firebase deployment (the working approach)
          echo "GOOGLE_API_KEY=$API_KEY" > .env.production
          rm /tmp/service-account.json
      
      - name: Build project (progressive)
        id: build-status
        continue-on-error: true
        run: |
          if npm run build; then
            echo "BUILD_STATUS=success" >> $GITHUB_OUTPUT
            echo "✅ Build succeeded"
          else
            echo "BUILD_STATUS=failed" >> $GITHUB_OUTPUT
            echo "⚠️ Build failed - deploying last known good state"
            # Create minimal fallback build for preview
            mkdir -p out
            echo "<html><body><h1>Build Preview Unavailable</h1><p>Build failed but preview deployed for debugging</p></body></html>" > out/index.html
          fi
        env:
          GOOGLE_API_KEY: ${{ env.GOOGLE_API_KEY }}
          NEXT_PUBLIC_BUILD_COMMIT: ${{ github.sha }}
          NEXT_PUBLIC_BUILD_BRANCH: ${{ github.head_ref }}
          NEXT_PUBLIC_BUILD_TIME: ${{ github.event.head_commit.timestamp || github.run_started_at }}
        
      - name: Deploy to Firebase Preview Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        id: firebase_deploy
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_BARTERVERSE_L9UQ3 }}'
          projectId: barterverse-l9uq3
          target: barterverse-auto-deploy
          expires: 7d
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          GOOGLE_API_KEY: ${{ env.GOOGLE_API_KEY }}
      
      - name: Comment on PR with deployment info
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentUrl = '${{ steps.firebase_deploy.outputs.details_url }}' || 'https://barterverse-auto-deploy.web.app';
            const commit = '${{ github.event.pull_request.head.sha }}'.slice(0, 7);
            const branch = '${{ github.head_ref }}';
            const buildTime = new Date().toLocaleString();
            const buildStatus = '${{ steps.build-status.outputs.BUILD_STATUS }}';
            const ciStatus = '${{ steps.ci-status.outputs.CI_STATUS }}';
            
            const statusEmoji = buildStatus === 'success' ? '🚀' : '⚠️';
            const title = buildStatus === 'success' ? 'Preview Deployment Successful!' : 'Preview Deployed (with issues)';
            
            const comment = `## ${statusEmoji} ${title}
            
            **🌐 Preview URL:** ${deploymentUrl}  
            **📝 Branch:** \`${branch}\`  
            **💾 Commit:** \`${commit}\`  
            **⏰ Built:** ${buildTime}  
            **🔧 APIs:** Secret Manager integration enabled ✅
            **📊 Build Status:** ${buildStatus === 'success' ? '✅ Success' : '⚠️ Failed (fallback deployed)'}
            
            **Quick Links:**
            - [📱 Open Preview Site](${deploymentUrl})
            - [🔧 Test API Endpoint](${deploymentUrl}/api/test-key)
            - [📊 View Commit](https://github.com/${{ github.repository }}/commit/${{ github.event.pull_request.head.sha }})
            
            ${buildStatus === 'failed' ? '⚠️ **Note:** Build failed but preview deployed for debugging. Check build logs for details.' : ''}
            
            *Preview expires in 7 days*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });